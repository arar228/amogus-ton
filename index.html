<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>amogus on TON 💎</title>
<meta name="description" content="amogus. On TON. Nothing else needed." />
<style>
  :root{
    --ton:#0098ea;
    --red:#c1121f;
    --red-dark:#7a0a14;
    --lips:#bfe3d0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(circle at 50% 30%, #0a3a52 0%, #041824 70%);
    color:#eaf6ff;
    overflow-x:hidden;
    text-align:center;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    user-select:none;
  }

  /* floating TON diamonds in the background */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .diamond{
    position:absolute;font-size:24px;opacity:.25;
    animation:float linear infinite;
  }
  @keyframes float{
    0%{transform:translateY(110vh) rotate(0deg)}
    100%{transform:translateY(-20vh) rotate(360deg)}
  }

  .wrap{position:relative;z-index:1;padding:40px 16px 60px;width:100%;max-width:680px}

  h1{
    font-size:clamp(48px,16vw,140px);
    letter-spacing:.04em;
    background:linear-gradient(90deg,var(--red),#ff5a5f,var(--ton));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(193,18,31,.35);
    animation:wob 2.2s ease-in-out infinite;
    margin-bottom:6px;
  }
  @keyframes wob{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  .sub{font-size:clamp(14px,4vw,20px);opacity:.8;margin-bottom:28px}
  .sub b{color:var(--ton)}

  /* the amogus dude, pure CSS */
  .stage{cursor:pointer;display:inline-block}
  .amogus{
    width:200px;height:240px;position:relative;margin:0 auto;
    animation:bob 1.6s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
  .stage:active .amogus{animation:spin .6s linear}
  @keyframes spin{100%{transform:rotate(360deg)}}

  .body{
    position:absolute;left:30px;top:30px;width:140px;height:185px;
    background:linear-gradient(var(--red),var(--red-dark));
    border-radius:70px 70px 55px 55px;
    box-shadow:inset -18px 0 30px rgba(0,0,0,.35), 0 18px 40px rgba(0,0,0,.5);
  }
  .backpack{
    position:absolute;left:8px;top:70px;width:38px;height:95px;
    background:linear-gradient(var(--red),var(--red-dark));
    border-radius:20px;box-shadow:inset -8px 0 16px rgba(0,0,0,.35);
  }
  .leg{position:absolute;bottom:-2px;width:46px;height:34px;background:var(--red-dark);border-radius:0 0 22px 22px}
  .leg.l{left:42px}.leg.r{right:42px}
  /* visor = giant lips */
  .visor{
    position:absolute;left:62px;top:62px;width:120px;height:78px;
    background:radial-gradient(circle at 38% 30%, #fff 0%, var(--lips) 45%, #8fc4a8 100%);
    border-radius:60px / 48px;
    border:6px solid #7a0a14;
    box-shadow:inset 0 -10px 18px rgba(0,0,0,.25);
    overflow:hidden;
  }
  .visor::before{
    content:"";position:absolute;left:50%;top:8px;width:78%;height:6px;
    background:#3d5a4c;transform:translateX(-50%);border-radius:6px;opacity:.6;
  }
  .visor::after{
    content:"";position:absolute;left:8px;top:8px;width:26px;height:14px;
    background:rgba(255,255,255,.85);border-radius:50%;transform:rotate(-18deg);
  }

  .btns{margin-top:38px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{
    border:none;cursor:pointer;font-weight:700;font-size:16px;
    padding:14px 26px;border-radius:40px;color:#fff;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-3px) scale(1.04)}
  .btn:active{transform:scale(.96)}
  .btn.ton{background:linear-gradient(120deg,var(--ton),#0066b3);box-shadow:0 10px 26px rgba(0,152,234,.4)}
  .btn.sus{background:linear-gradient(120deg,var(--red),#ff5a5f);box-shadow:0 10px 26px rgba(193,18,31,.4)}

  .counter{margin-top:26px;font-size:18px;opacity:.85}
  .counter b{color:#ffd54a;font-size:24px}

  footer{margin-top:auto;padding:22px;font-size:13px;opacity:.5;z-index:1}
  footer a{color:var(--ton);text-decoration:none}

  .toast{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(80px);
    background:#0098ea;color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;
    opacity:0;transition:.3s;z-index:5;box-shadow:0 10px 30px rgba(0,0,0,.4)
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  /* mobile */
  @media (max-width:600px){
    .wrap{padding:28px 14px 48px}
    .amogus{width:160px;height:196px;transform:scale(1)}
    .body{left:24px;top:24px;width:112px;height:148px;border-radius:56px 56px 44px 44px}
    .backpack{left:6px;top:56px;width:30px;height:76px}
    .visor{left:50px;top:50px;width:96px;height:62px;border-width:5px}
    .leg{width:38px;height:28px}.leg.l{left:34px}.leg.r{right:34px}
    .btns{flex-direction:column;align-items:stretch;gap:12px;padding:0 8px}
    .btn{width:100%;padding:16px 20px;font-size:17px}
    .counter{margin-top:22px}
    footer{padding:18px 14px}
  }
  @media (max-width:600px) and (orientation:landscape){
    .amogus{width:120px;height:150px}
    .btns{flex-direction:row}
    .btn{width:auto}
  }
  @media (hover:none){
    .btn:hover{transform:none}
  }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="wrap">
    <h1>amogus</h1>
    <p class="sub">red. sus. on <b>TON</b> 💎</p>

    <div class="stage" id="stage" title="poke him">
      <div class="amogus">
        <div class="backpack"></div>
        <div class="body"></div>
        <div class="visor"></div>
        <div class="leg l"></div>
        <div class="leg r"></div>
      </div>
    </div>

    <div class="btns">
      <button class="btn sus" id="susBtn">SUS? 🔴</button>
      <button class="btn ton" id="tonBtn">to the moon 🚀</button>
    </div>

    <p class="counter">sus reported: <b id="count">0</b></p>
  </div>

  <footer>made for pure fun · <a href="https://x.com/i/status/2060382820548415878" target="_blank" rel="noopener">the tweet 🐦</a> · <a href="https://ton.org" target="_blank" rel="noopener">TON</a> · amogus 4ever</footer>

  <div class="toast" id="toast">sus 🔴</div>

<script>
  // diamonds
  const stars=document.getElementById('stars');
  const gems=['💎','🔵','🚀','🔴','💠'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='diamond';
    d.textContent=gems[Math.floor(Math.random()*gems.length)];
    d.style.left=Math.random()*100+'vw';
    d.style.fontSize=(14+Math.random()*30)+'px';
    d.style.animationDuration=(8+Math.random()*14)+'s';
    d.style.animationDelay=(-Math.random()*14)+'s';
    stars.appendChild(d);
  }

  // counter + toast
  let n=Number(localStorage.getItem('sus')||0);
  const countEl=document.getElementById('count');
  countEl.textContent=n;
  const toast=document.getElementById('toast');
  const lines=['sus 🔴','amogus','suspicious...','he is the impostor','when the task','red sus','💎 sus on TON'];
  let t;
  function pop(msg){
    toast.textContent=msg||lines[Math.floor(Math.random()*lines.length)];
    toast.classList.add('show');
    clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1100);
  }
  function bump(){
    n++;countEl.textContent=n;localStorage.setItem('sus',n);
  }

  document.getElementById('stage').addEventListener('click',()=>{bump();pop();});
  document.getElementById('susBtn').addEventListener('click',()=>{bump();pop('SUS 🔴🔴🔴');});
  document.getElementById('tonBtn').addEventListener('click',()=>{
    pop('🚀 to the moon!');
    for(let i=0;i<3;i++)setTimeout(bump,i*120);
  });
</script>
</body>
</html>
